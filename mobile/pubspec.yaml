name: flete_app
description: App de fletes para Chile
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP y almacenamiento
  dio: ^5.4.3
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.3

  # Estado
  flutter_riverpod: ^2.5.1

  # Navegación
  go_router: ^13.2.0

  # Mapas y geolocalización
  google_maps_flutter: ^2.6.1
  geolocator: ^11.0.0
  geocoding: ^3.0.0

  # Firebase — versiones compatibles con Xcode 26
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3

  # UI
  cupertino_icons: ^1.0.6
  flutter_spinkit: ^5.2.1
  cached_network_image: ^3.3.1
  image_picker: ^1.1.2
  intl: ^0.19.0

  google_fonts: ^6.2.1   

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/

